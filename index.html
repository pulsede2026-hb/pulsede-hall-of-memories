let currentSong = 0;

const player = document.getElementById("audioPlayer");
const source = player.querySelector("source");
const cover = document.getElementById("mainCover");
const title = document.getElementById("songTitle");
const text = document.getElementById("songText");
const nextSongs = document.getElementById("nextSongs");


async function loadText(songFile) {
    const txtFile = songFile.replace(".mp3", ".txt");

    try {
        const response = await fetch(encodeURI(txtFile));
        const data = await response.text();
        text.innerText = data;
    } catch (error) {
        text.innerText = "Textdatei nicht gefunden.";
    }
}
function changeSong(index) {

    if (index >= playlist.length) return;

    currentSong = index;

    source.src = playlist[currentSong];

    cover.src = playlist[currentSong]
        .replace(".mp3", ".jpg");

    title.innerText = playlist[currentSong]
        .replace(".mp3", "")
        .replaceAll("_", " ");

    loadText(playlist[currentSong]);

let html = "";
let shown = 0;
let i = currentSong + 1;

while (shown < 3 && i < playlist.length) {

    if (playlist[i] && covers[i]) {

        html += `<img src="${covers[i]}" onclick="changeSong(${i})">`;
        shown++;
    }

    i++;
}
nextSongs.innerHTML = html;
    player.load();
    player.play();
}

document.getElementById("toggleText")
.addEventListener("click", function () {

const songText =
document.getElementById("songText");

if (songText.style.display === "none") {

    songText.style.display = "block";
    this.innerText = "📝 Song ausblenden";

} else {

    songText.style.display = "none";
    this.innerText = "📝 Song lesen";

}

});
